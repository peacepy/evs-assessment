<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Studies II — Quantum University</title>
    <style>
        :root {
            --primary: #3b82f6; --success: #22c55e; --error: #ef4444;
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 650px; background: var(--card); padding: 2rem; border-radius: 16px; position: relative; }
        
        /* Logo Styling */
        .univ-logo { display: block; margin: 0 auto 1rem; max-width: 180px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        
        .header-section { text-align: center; margin-bottom: 2rem; }
        .main-title { font-size: 1.5rem; font-weight: 800; color: #fff; text-transform: uppercase; }
        
        /* Security Alert Overlay */
        #security-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem;
        }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 1rem; }
        .option-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; text-align: left; cursor: pointer; }
        .correct { background: #064e3b !important; border-color: var(--success); }
        .wrong { background: #7f1d1d !important; border-color: var(--error); }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="security-overlay">
    <h1 style="color:var(--error)">⚠️ SECURITY VIOLATION</h1>
    <p>You switched tabs or minimized the window. <br>To maintain academic integrity, your quiz has been <strong>automatically submitted</strong>.</p>
    <button class="btn" onclick="location.reload()">Return to Login</button>
</div>

<div class="container">
    <img src="https://quantumuniversity.edu.in/images/qu-logo-name.svg" alt="Quantum University Logo" class="univ-logo">
    
    <div class="header-section">
        <div class="main-title">Environmental Studies II</div>
        <div style="color: #94a3b8;">Official Examination Portal</div>
    </div>

    <div id="login-screen">
        <input type="text" id="login-id" placeholder="Student ID">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn" onclick="attemptLogin()">Verify & Start</button>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div id="q-text" style="font-size: 1.1rem; margin-bottom: 1.5rem; font-weight: 600;"></div>
        <div id="opt-container"></div>
    </div>

    <div id="result-screen" style="display: none; text-align: center;">
        <h2>Assessment Summary</h2>
        <div id="final-score" style="font-size: 3rem; font-weight: 900; color: var(--primary);"></div>
        <p id="status-msg"></p>
    </div>
</div>

<script>
    const GITHUB_DATA_URL = 'https://raw.githubusercontent.com/peacepy/evs-assessment/refs/heads/main/data.json';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzL7jNUPVV6KK6frTg_0ccx4CkuirRpENQaLAu8nwUQHphOm17eXQ0hOMd2_jZA_QYu/exec';

    let db = { students: {}, questions: [] };
    let quizActive = false;
    let quizState = { id: '', name: '', index: 0, score: 0 };

    // Fetch Database from GitHub
    async function init() {
        try {
            const res = await fetch(GITHUB_DATA_URL);
            db = await res.json();
            console.log("Database Synced from GitHub");
        } catch (e) { alert("Failed to load assessment data."); }
    }

    // Security: Tab Switching Detection
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && quizActive) {
            quizActive = false;
            document.getElementById('security-overlay').style.display = 'flex';
            autoSubmit();
        }
    });

    async function autoSubmit() {
        // Immediately trigger the Google Sheet upload
        await saveScore();
        document.getElementById('quiz-screen').style.display = 'none';
    }

    function attemptLogin() {
        const id = document.getElementById('login-id').value;
        const pass = document.getElementById('login-pass').value;
        if (db.students[id] && db.students[id].pass === pass) {
            quizState.id = id;
            quizState.name = db.students[id].name;
            startQuiz();
        } else { alert("Invalid Credentials"); }
    }

    function startQuiz() {
        quizActive = true;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQ();
    }

    // ... (Question Loading and Scoring logic stays the same) ...

    async function saveScore() {
        const payload = { studentId: quizState.id, name: quizState.name, score: quizState.score };
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    }

    init();
</script>
</body>
</html>
