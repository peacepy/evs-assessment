<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Environmental Studies II — Quantum University</title>
    <style>
        :root {
            --primary: #6366f1; --success: #10b981; --error: #f43f5e;
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 95%; max-width: 650px; background: var(--card);
            padding: 2.5rem; border-radius: 20px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .univ-logo { width: 100%; max-width: 280px; margin-bottom: 1.5rem; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
        .main-title { font-size: 1.6rem; font-weight: 800; text-transform: uppercase; margin: 0; color: #fff; }
        
        #security-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
        }

        .input-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
        input {
            width: 100%; padding: 14px; background: #334155; border: 1px solid #475569;
            border-radius: 8px; color: #fff; font-size: 1rem; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 15px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .student-info { background: #0f172a; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; line-height: 1.8; border: 1px solid #334155; }
        
        .option-btn {
            width: 100%; padding: 14px; margin-bottom: 10px; background: #334155; border: 1px solid #475569;
            border-radius: 8px; color: white; text-align: left; cursor: pointer; font-size: 1rem;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #3d4b5f; }
        .correct { background: #064e3b !important; border-color: var(--success) !important; }
        .wrong { background: #7f1d1d !important; border-color: var(--error) !important; }

        .progress-bar { height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease-out; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="security-overlay">
    <h1 style="color:var(--error)">⚠️ SECURITY VIOLATION</h1>
    <p>Switching tabs is strictly prohibited during the assessment.</p>
    <p>Your current progress has been automatically submitted.</p>
    <button class="btn" onclick="location.reload()">Back to Login</button>
</div>

<div class="container">
    <img src="https://quantumuniversity.edu.in/images/qu-logo-name.svg" alt="Quantum University" class="univ-logo">
    
    <div id="login-screen">
        <h2 class="main-title">Environmental Studies II</h2>
        <p style="color: #94a3b8; margin-bottom: 2rem;">Official Examination Portal</p>
        <div class="input-group">
            <label>STUDENT ID</label>
            <input type="text" id="login-id" placeholder="Enter Student ID">
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="login-pass" placeholder="Enter Password">
        </div>
        <button class="btn" id="login-btn" onclick="attemptLogin()" disabled>Syncing Cloud Database...</button>
    </div>

    <div id="dashboard-screen" style="display: none;">
        <h2 class="main-title">Verification Successful</h2>
        <div class="student-info" id="user-details"></div>
        <button class="btn" onclick="startQuiz()">Begin Assessment Now</button>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div style="margin-bottom: 2rem; text-align: left;">
            <div id="q-count" style="color: #94a3b8; font-size: 0.85rem; font-weight: 600;"></div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        <div id="q-text" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; text-align: left; line-height: 1.6;"></div>
        <div id="opt-container"></div>
    </div>

    <div id="result-screen" style="display: none;">
        <h2 style="color: var(--success);">Submission Successful</h2>
        <div class="student-info" id="final-details"></div>
        <div id="final-score" style="font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 1rem 0;"></div>
        <p id="cloud-status" style="font-size: 0.9rem; color: #94a3b8;"></p>
        <button class="btn" onclick="location.reload()">Logout</button>
    </div>
</div>

<script>
    // Configuration
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/peacepy/evs-assessment/refs/heads/main/data.json';
    const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzL7jNUPVV6KK6frTg_0ccx4CkuirRpENQaLAu8nwUQHphOm17eXQ0hOMd2_jZA_QYu/exec';

    let db = { students: {}, questions: [] };
    let quizActive = false;
    let quizState = { id: '', name: '', index: 0, score: 0 };

    async function init() {
        const btn = document.getElementById('login-btn');
        try {
            const res = await fetch(GITHUB_RAW_URL);
            if (!res.ok) throw new Error("Fetch failed");
            db = await res.json();
            btn.disabled = false;
            btn.innerText = "Enter Examination";
        } catch (e) {
            btn.innerText = "❌ Database Offline";
            console.error(e);
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden && quizActive) {
            quizActive = false;
            document.getElementById('security-overlay').style.display = 'flex';
            autoSubmit("Violation: Tab Switched");
        }
    });

    function attemptLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        const user = db.students[id];

        if (user && String(user.pass) === pass) {
            quizState.id = id;
            quizState.name = user.name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            document.getElementById('user-details').innerHTML = `
                <strong>Candidate:</strong> ${user.name}<br>
                <strong>Student ID:</strong> ${id}<br>
                <strong>Institution:</strong> Quantum University
            `;
        } else {
            alert("Login Failed: Incorrect Student ID or Password.");
        }
    }

    function startQuiz() {
        quizActive = true;
        document.getElementById('dashboard-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const qData = db.questions[quizState.index];
        document.getElementById('q-count').innerText = `ITEM ${quizState.index + 1} OF ${db.questions.length}`;
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('progress-fill').style.width = ((quizState.index + 1) / db.questions.length * 100) + '%';
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';

        qData.opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(idx);
            container.appendChild(btn);
        });
    }

    function selectOption(idx) {
        const qData = db.questions[quizState.index];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (idx === qData.ans) {
            buttons[idx].classList.add('correct');
            quizState.score++;
        } else {
            buttons[idx].classList.add('wrong');
            buttons[qData.ans].classList.add('correct');
        }

        setTimeout(() => {
            if (quizState.index < db.questions.length - 1) {
                quizState.index++;
                loadQuestion();
            } else {
                finishQuiz();
            }
        }, 1000);
    }

    function finishQuiz() {
        quizActive = false;
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${quizState.score} / ${db.questions.length}`;
        document.getElementById('final-details').innerHTML = `<strong>Candidate:</strong> ${quizState.name}<br><strong>ID:</strong> ${quizState.id}`;
        autoSubmit("Completed Normally");
    }

    async function autoSubmit(status) {
        const cloudMsg = document.getElementById('cloud-status');
        if(cloudMsg) cloudMsg.innerText = "⏳ Archiving results to cloud...";
        try {
            await fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    studentId: quizState.id,
                    name: quizState.name,
                    score: quizState.score,
                    status: status
                })
            });
            if(cloudMsg) cloudMsg.innerText = "✅ Result successfully saved to faculty record.";
        } catch (e) {
            if(cloudMsg) cloudMsg.innerText = "❌ Sync error. Please screenshot this page.";
        }
    }

    window.onload = init;
</script>
</body>
</html>
