<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Environmental Studies II — Quantum University</title>
    <style>
        :root {
            --primary: #6366f1; --success: #10b981; --error: #f43f5e;
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 650px; background: var(--card);
            padding: 2.5rem; border-radius: 20px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .univ-logo { max-width: 180px; margin-bottom: 1.5rem; }
        .main-title { font-size: 1.6rem; font-weight: 800; text-transform: uppercase; margin: 0; color: #fff; }
        .btn {
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 15px;
        }
        .student-info { background: #0f172a; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; line-height: 1.8; }
        .option-btn {
            width: 100%; padding: 14px; margin-bottom: 10px; background: #334155; border: 1px solid #475569;
            border-radius: 8px; color: white; text-align: left; cursor: pointer; font-size: 1rem;
        }
        .correct { background: #064e3b !important; }
        .wrong { background: #7f1d1d !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <img src="https://quantumuniversity.edu.in/wp-content/uploads/2023/10/Quantum-University-Logo.png" alt="Quantum University" class="univ-logo">
    
    <div id="login-screen">
        <h2 class="main-title">Environmental Studies II</h2>
        <p style="color: #94a3b8; margin-bottom: 2rem;">Official Examination Portal</p>
        <div style="text-align: left; margin-bottom: 1rem;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #94a3b8;">STUDENT ID</label>
            <input type="text" id="login-id" style="width:100%; padding:14px; background:#334155; border:1px solid #475569; border-radius:8px; color:white; margin-top:5px;">
        </div>
        <div style="text-align: left; margin-bottom: 1.5rem;">
            <label style="font-size: 0.85rem; font-weight: 600; color: #94a3b8;">PASSWORD</label>
            <input type="password" id="login-pass" style="width:100%; padding:14px; background:#334155; border:1px solid #475569; border-radius:8px; color:white; margin-top:5px;">
        </div>
        <button class="btn" id="login-btn" onclick="attemptLogin()">Enter Examination</button>
    </div>

    <div id="dashboard-screen" style="display: none;">
        <h2 class="main-title">Verification Successful</h2>
        <div class="student-info" id="user-details"></div>
        <button class="btn" onclick="startQuiz()">Begin Assessment Now</button>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div id="q-count" style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 1rem; text-align: left;"></div>
        <div id="q-text" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; text-align: left;"></div>
        <div id="opt-container"></div>
    </div>
</div>

<script>
    // 1. UPDATE THESE URLS
    const GITHUB_DATA_URL = 'https://raw.githubusercontent.com/peacepy/evs-assessment/refs/heads/main/data.json';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzL7jNUPVV6KK6frTg_0ccx4CkuirRpENQaLAu8nwUQHphOm17eXQ0hOMd2_jZA_QYu/exec';

    let db = { students: {}, questions: [] };
    let quizState = { id: '', name: '', index: 0, score: 0 };

    // 1. Fetch data from GitHub immediately
    async function init() {
        try {
            const res = await fetch(GITHUB_JSON_URL);
            db = await res.json();
            console.log("Database Synced");
        } catch (e) {
            alert("Warning: Could not sync question bank from GitHub.");
        }
    }

    // 2. Login Logic
    function attemptLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        
        // Safety check for studentDB or GitHub db
        const user = db.students[id];

        if (user && String(user.pass) === pass) {
            quizState.id = id;
            quizState.name = user.name;
            
            // UI Transition
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            
            document.getElementById('user-details').innerHTML = `
                <strong>Candidate:</strong> ${user.name}<br>
                <strong>Student ID:</strong> ${id}<br>
                <strong>Course:</strong> B.Tech Civil Engineering
            `;
        } else {
            alert("Invalid Student ID or Password.");
        }
    }

    // 3. Quiz Start Logic (The Fix)
    function startQuiz() {
        if (!db.questions || db.questions.length === 0) {
            alert("Error: Question bank not loaded yet.");
            return;
        }
        
        // UI Transition
        document.getElementById('dashboard-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        loadQuestion();
    }

    function loadQuestion() {
        const qData = db.questions[quizState.index];
        document.getElementById('q-count').innerText = `ITEM ${quizState.index + 1} OF ${db.questions.length}`;
        document.getElementById('q-text').innerText = qData.q;
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';

        qData.opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(idx);
            container.appendChild(btn);
        });
    }

    function selectOption(idx) {
        const qData = db.questions[quizState.index];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (idx === qData.ans) {
            buttons[idx].classList.add('correct');
            quizState.score++;
        } else {
            buttons[idx].classList.add('wrong');
            buttons[qData.ans].classList.add('correct');
        }

        setTimeout(() => {
            if (quizState.index < db.questions.length - 1) {
                quizState.index++;
                loadQuestion();
            } else {
                alert("Assessment Completed. Final Score: " + quizState.score);
                location.reload(); 
            }
        }, 1000);
    }

    init();
</script>
</body>
</html>
