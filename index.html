            --text: #f1f5f9;
            --input-bg: #334155;
        }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; 
        }
        .container { 
            width: 90%; max-width: 650px; background: var(--card); padding: 2.5rem; 
            border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }
        .header-section { text-align: center; margin-bottom: 2.5rem; }
        .main-title { font-size: 1.75rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .sub-title { font-size: 1rem; color: #94a3b8; margin-top: 0.5rem; font-weight: 500; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
        input { 
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #475569; 
            border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 1rem;
        }
        .btn { 
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1rem; 
            transition: all 0.2s; text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .student-info { background: #0f172a; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #334155; line-height: 1.8; }
        .option-btn { 
            width: 100%; padding: 15px; border: 1px solid #475569; border-radius: 8px; 
            background: var(--input-bg); color: var(--text); cursor: pointer; text-align: left; 
            margin-bottom: 12px; font-size: 1rem; transition: 0.2s; 
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #3d4b5f; }
        .option-btn.correct { background: #064e3b; border-color: var(--success); color: #dcfce7; font-weight: 600; }
        .option-btn.wrong { background: #7f1d1d; border-color: var(--error); color: #fee2e2; }
        .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease-out; }
        #status-msg { margin-top: 1rem; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>

    function attemptLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        if (studentDB[id] && pass === "EVSQUIZ") {
            currentUser = { id: id, ...studentDB[id] };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            document.getElementById('user-details').innerHTML = `
                <strong>Candidate Name:</strong> ${currentUser.name}<br>
                <strong>Student ID:</strong> ${currentUser.id}<br>
                <strong>Roll Number:</strong> ${currentUser.roll}
            `;
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function startQuiz() {
        document.getElementById('dashboard-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        const data = qBank[index];
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('q-count').innerText = `ITEM ${index + 1} OF ${qBank.length}`;
        document.getElementById('progress-fill').style.width = ((index + 1) / qBank.length * 100) + '%';
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';
        data.opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = o;
            btn.onclick = () => select(i, btn);
            container.appendChild(btn);
        });
    }

    function select(i, btn) {
        const data = qBank[index];
        const btns = document.querySelectorAll('.option-btn');
        if (i === data.ans) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            btns[data.ans].classList.add('correct');
        }
        btns.forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    async function handleNext() {
        index++;
        if (index < qBank.length) {
            loadQ();
        } else {
            showResults();
            await saveScoreToSheet();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-user-details').innerHTML = `
            <strong>Student:</strong> ${currentUser.name}<br>
            <strong>ID:</strong> ${currentUser.id} | <strong>Roll:</strong> ${currentUser.roll}
        `;
        document.getElementById('final-score').innerText = `${score} / ${qBank.length}`;
    }

    async function saveScoreToSheet() {
        const status = document.getElementById('status-msg');
        const finishBtn = document.getElementById('finish-btn');
        
        status.innerText = "⏳ Archiving results to cloud...";
        status.style.color = "var(--primary)";
        finishBtn.disabled = true;

        const payload = {
            studentId: currentUser.id,
            name: currentUser.name,
            score: score
        };

        try {
            // Using POST with no-cors to handle Google Script redirects
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            status.innerText = "✅ Record successfully archived in Google Sheets.";
            status.style.color = "var(--success)";
        } catch (e) {
            status.innerText = "⚠️ Cloud sync error. Please screenshot your score.";
            status.style.color = "var(--error)";
            console.error(e);
        } finally {
            finishBtn.disabled = false;
        }
    }
</script>
</body>
</html>
